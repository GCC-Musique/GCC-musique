<script type="module">
// ── Firebase sync pour login.html ──────────────────────────
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getFirestore, doc, getDoc }
  from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

const firebaseConfig = {
  apiKey:            "AIzaSyCZK_h4biEJgnNWgeHW7qJqd0jpCUieho8",
  authDomain:        "gcc-musique.firebaseapp.com",
  projectId:         "gcc-musique",
  storageBucket:     "gcc-musique.firebasestorage.app",
  messagingSenderId: "482218143172",
  appId:             "1:482218143172:web:d9434c5476f1c1dd174891"
};

let _db=null;
try{
  const app=initializeApp(firebaseConfig);
  _db=getFirestore(app);
  window._fbDb=_db;
  window._fbReady=true;
}catch(e){ window._fbReady=false; }

// Charge members + pending depuis Firestore → localStorage
window._fbSyncLogin=async function(){
  if(!window._fbReady)return;
  try{
    const bar=document.getElementById('login-sync-bar');
    if(bar) bar.style.display='flex';
    // Fetch members
    const mSnap=await getDoc(doc(_db,'gcc_data','members'));
    if(mSnap.exists()){
      const remote=JSON.parse(mSnap.data().v);
      const remoteT=mSnap.data().t||0;
      const localT=parseInt(localStorage.getItem('gcc_members_t')||'0');
      if(remoteT>localT||!localStorage.getItem('gcc_members')){
        localStorage.setItem('gcc_members',JSON.stringify(remote));
        localStorage.setItem('gcc_members_t',remoteT);
      }
    }
    // Fetch pending
    const pSnap=await getDoc(doc(_db,'gcc_data','pending'));
    if(pSnap.exists()){
      const remote=JSON.parse(pSnap.data().v);
      const remoteT=pSnap.data().t||0;
      const localT=parseInt(localStorage.getItem('gcc_pending_t')||'0');
      if(remoteT>localT||!localStorage.getItem('gcc_pending')){
        localStorage.setItem('gcc_pending',JSON.stringify(remote));
        localStorage.setItem('gcc_pending_t',remoteT);
      }
    }
    if(bar) bar.style.display='none';
  }catch(e){ console.warn('fbSyncLogin error:',e); }
};
</script>

<style>
:root{
  --gold:#C9A84C;--gold-l:#E8D5A3;--gold-d:#8B6914;
  --ink:#1A1410;--ink2:#3D2E1E;
  --par:#F9F4EC;--par2:#EFE8D8;
  --smoke:#6B5D4F;--smokel:#9C8E82;
  --blue:#3D5A80;--red:#8B2635;--green:#2D6A4F;
  --border:rgba(201,168,76,0.22);--border2:rgba(201,168,76,0.45);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Jost',sans-serif;background:var(--ink);color:var(--par);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:40px 16px 60px;position:relative;overflow-y:auto;}
body::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 10%,rgba(201,168,76,0.11) 0%,transparent 60%);pointer-events:none;}

.auth-header{display:flex;flex-direction:column;align-items:center;margin-bottom:28px;position:relative;z-index:1;}
.auth-logo{width:80px;height:80px;border-radius:50%;object-fit:cover;border:2px solid rgba(201,168,76,0.4);margin-bottom:12px;}
.auth-brand{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:400;color:var(--gold-l);letter-spacing:.06em;margin-bottom:3px;}
.auth-brand span{color:var(--gold);}
.auth-sub{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);}

.auth-tabs{display:flex;border-bottom:1px solid rgba(201,168,76,0.18);margin-bottom:0;width:min(400px,100%);position:relative;z-index:1;}
.auth-tab{flex:1;padding:12px;text-align:center;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:rgba(249,244,236,0.35);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;background:none;border-top:none;border-left:none;border-right:none;font-family:'Jost',sans-serif;}
.auth-tab.active{color:var(--gold);border-bottom-color:var(--gold);}
.auth-tab:hover{color:var(--gold-l);}

.auth-card{background:rgba(255,255,255,0.04);border:1px solid rgba(201,168,76,0.18);border-top:none;border-radius:0 0 16px 16px;padding:24px;width:min(400px,100%);position:relative;z-index:1;}
.auth-section{display:none;}
.auth-section.active{display:block;}

.lbl{display:block;font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:rgba(249,244,236,0.35);margin-bottom:5px;margin-top:12px;}
.lbl:first-child{margin-top:0;}
.inp{width:100%;display:block;background:rgba(255,255,255,0.05);border:1px solid rgba(201,168,76,0.22);border-radius:8px;padding:10px 14px;color:var(--par);font-family:'Jost',sans-serif;font-size:13px;outline:none;transition:border-color .2s;}
.inp::placeholder{color:rgba(249,244,236,0.25);}
.inp:focus{border-color:var(--gold);}
.inp-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.btn-submit{width:100%;background:var(--gold);color:var(--ink);border:none;cursor:pointer;border-radius:8px;padding:12px;font-family:'Jost',sans-serif;font-size:13px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;transition:background .2s,transform .1s;margin-top:16px;}
.btn-submit:hover{background:var(--gold-l);}
.btn-submit:active{transform:scale(.98);}
.err{color:#F4A0A0;font-size:12px;text-align:center;margin-top:8px;min-height:17px;}
.ok{color:#7ECBA1;font-size:12px;text-align:center;margin-top:8px;min-height:17px;}
.hint{margin-top:18px;border-top:1px solid rgba(201,168,76,0.1);padding-top:15px;font-size:10px;color:rgba(249,244,236,0.25);text-align:center;line-height:1.9;}
.hint b{color:rgba(249,244,236,0.42);}
.pending-notice{background:rgba(201,168,76,0.08);border:1px solid rgba(201,168,76,0.2);border-radius:8px;padding:10px 14px;font-size:12px;color:rgba(249,244,236,0.45);margin-top:12px;line-height:1.6;text-align:center;}
.shared-notice{background:rgba(201,168,76,0.08);border:1px solid rgba(201,168,76,0.25);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--gold-l);margin-bottom:14px;text-align:center;display:none;}
select.inp{color:var(--par);} select.inp option{background:#2a1f14;color:var(--par);}

@media(max-width:420px){
  .inp-row{grid-template-columns:1fr;}
  .auth-card{padding:18px 14px;}
}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
</style>
</head>

  <!-- REGISTER -->
  <div class="auth-section" id="tab-register">
    <div class="inp-row">
      <div>
        <label class="lbl">Prénom Nom *</label>
        <input class="inp" type="text" id="r-name" placeholder="Jean Dupont" />
      </div>
      <div>
        <label class="lbl">Identifiant * <span style="font-size:9px;opacity:.5">(sans espace)</span></label>
        <input class="inp" type="text" id="r-id" placeholder="jean" autocomplete="username" />
      </div>
    </div>
    <div class="inp-row" style="margin-top:0">
      <div>
        <label class="lbl">Mot de passe *</label>
        <input class="inp" type="password" id="r-pass" placeholder="••••••" autocomplete="new-password" />
      </div>
      <div>
        <label class="lbl">Confirmer *</label>
        <input class="inp" type="password" id="r-pass2" placeholder="••••••" autocomplete="new-password" />
      </div>
    </div>
    <label class="lbl">Voix / Instrument</label>
    <input class="inp" type="text" id="r-voice" placeholder="ex. Soprano, Piano, Guitare…" />
    <button class="btn-submit" id="btn-register" onclick="doRegister()">Créer mon compte</button>
    <div class="err" id="r-err"></div>

    <div class="pending-notice">ℹ️ Votre compte sera en attente de validation par le chef de chœur avant d'être activé.</div>
  </div>

</div>

// ── STORAGE ─────────────────────────────────────────────
function ls(k){ try{return JSON.parse(localStorage.getItem('gcc_'+k));}catch(e){return null;} }
function ss(k,v){ try{localStorage.setItem('gcc_'+k,JSON.stringify(v));}catch(e){} }

// ── DEFAULT MEMBERS ──────────────────────────────────────
async function ensureDefaultMembers(){
  // Sync from Firebase first
  if(window._fbSyncLogin) await window._fbSyncLogin();
  // Only seed defaults if still no members after Firebase sync
  const existing=ls('members')||[];
  if(!existing.length){
    // This is a fresh install — seed demo accounts
    ss('members',[
      {id:'admin',name:'Pasteur Bernard',pass:'admin123',isAdmin:true,roles:['Chef d\'orchestre'],gender:'M',photo:'',voice:'Direction',active:true},
      {id:'marie',name:'Marie Dubois',pass:'chant456',isAdmin:false,roles:['Chanteur'],gender:'F',photo:'',voice:'Soprano',active:true},
      {id:'paul',name:'Paul Martin',pass:'chant789',isAdmin:false,roles:['Chanteur'],gender:'M',photo:'',voice:'Ténor',active:true},
    ]);
  }
}

// Run async init before login is available
(async()=>{
  // Wait for Firebase module to be ready
  for(let i=0;i<30;i++){
    if(typeof window._fbReady!=='undefined') break;
    await new Promise(r=>setTimeout(r,100));
  }
  await ensureDefaultMembers();
})();

// ── DETECT SHARED PROG IN URL ────────────────────────────
const _sharedProgParam = new URLSearchParams(location.search).get('prog');
if(_sharedProgParam){
  document.getElementById('shared-notice').style.display='block';
  // Preserve the ?prog= param when redirecting to index
}

// If already logged in, go straight to app (preserving ?prog= if present)
if(ls('session') && ls('session').active !== false){
  const dest = 'index.html' + (_sharedProgParam ? '?prog='+_sharedProgParam : '');
  window.location.replace(dest);
}

// ── TABS ─────────────────────────────────────────────────
function switchTab(btn,id){
  document.querySelectorAll('.auth-tab').forEach(t=>t.classList.remove('active')); btn.classList.add('active');
  document.querySelectorAll('.auth-section').forEach(s=>s.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  document.getElementById('l-err').textContent='';
  document.getElementById('r-err').textContent='';document.getElementById('r-ok').textContent='';
}

// ── LOGIN ─────────────────────────────────────────────────
async function doLogin(){
  const id=document.getElementById('l-id').value.trim();
  const pass=document.getElementById('l-pass').value;
  const btn=document.querySelector('#tab-login .btn-submit');
  const err=document.getElementById('l-err');
  err.textContent='';
  if(!id||!pass){err.textContent='Remplissez tous les champs.';return;}

  // Refresh from Firebase before login attempt
  if(btn){btn.textContent='Connexion…';btn.disabled=true;}
  if(window._fbSyncLogin) await window._fbSyncLogin();
  if(btn){btn.textContent='Se connecter';btn.disabled=false;}

  const members=ls('members')||[];
  const m=members.find(x=>x.id===id&&x.pass===pass);
  if(!m){
    err.style.color='#F4A0A0';
    err.textContent='Identifiant ou mot de passe incorrect.';
    return;
  }
  if(!m.active){
    err.style.color='#F0C870';
    err.textContent='⏳ Compte en attente de validation par le chef de chœur.';
    return;
  }
  ss('session',m);
  const dest='index.html'+(_sharedProgParam?'?prog='+_sharedProgParam:'');
  window.location.replace(dest);
}
document.getElementById('l-pass').addEventListener('keydown',e=>{ if(e.key==='Enter') doLogin(); });

// ── REGISTER ──────────────────────────────────────────────
async function doRegister(){
  const name=document.getElementById('r-name').value.trim();
  const id=document.getElementById('r-id').value.trim().toLowerCase().replace(/\s+/g,'_');
  const pass=document.getElementById('r-pass').value;
  const pass2=document.getElementById('r-pass2').value;
  const voice=document.getElementById('r-voice').value.trim();
  const err=document.getElementById('r-err');
  const ok=document.getElementById('r-ok');
  err.textContent=''; ok.textContent='';
  if(!name||!id||!pass){ err.textContent='Veuillez remplir tous les champs obligatoires.'; return; }
  if(id.length<3){ err.textContent='L\'identifiant doit contenir au moins 3 caractères.'; return; }
  if(pass.length<4){ err.textContent='Le mot de passe doit contenir au moins 4 caractères.'; return; }
  if(pass!==pass2){ err.textContent='Les mots de passe ne correspondent pas.'; return; }
  const members=ls('members')||[];
  const pending=ls('pending')||[];
  if(members.find(x=>x.id===id)||pending.find(x=>x.id===id)){ err.textContent='Cet identifiant est déjà utilisé.'; return; }
  const entry={id,name,pass,voice,isAdmin:false,active:false,requestedAt:Date.now()};
  pending.push(entry); ss('pending',pending);
  // EmailJS notification
  const emailOK = EJS_PUBLIC_KEY!=='VOTRE_PUBLIC_KEY' && EJS_SERVICE_ID!=='VOTRE_SERVICE_ID';
  if(emailOK){
    const btn=document.getElementById('btn-register');
    btn.textContent='Envoi en cours…'; btn.disabled=true;
    try{
      await emailjs.send(EJS_SERVICE_ID, EJS_TEMPLATE_ID, {
        to_email: ADMIN_EMAIL, to_name: 'Chef de chœur',
        member_name: name, member_id: id, member_voice: voice||'Non précisé',
        date: new Date().toLocaleDateString('fr-FR',{weekday:'long',year:'numeric',month:'long',day:'numeric'}),
        app_name: 'GCC Musique', reply_to: ADMIN_EMAIL,
      });
      ok.textContent='✓ Demande envoyée ! Un email a été envoyé à l\'administrateur.';
    }catch(e){
      ok.textContent='✓ Demande enregistrée. (Email non configuré — voir EmailJS)';
    }finally{
      btn.textContent='Créer mon compte'; btn.disabled=false;
    }
  }else{
    ok.textContent='✓ Demande enregistrée ! En attente de validation par le chef de chœur.';
  }
  ['r-name','r-id','r-pass','r-pass2','r-voice'].forEach(f=>document.getElementById(f).value='');
}
